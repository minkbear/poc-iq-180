<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Math Game</title>
  <link rel="stylesheet" href="src/style.css?v=CACHE_BUST">
</head>
<body>
  <div class="container">
    <h1>Kids Math Game</h1>

    <!-- Settings -->
    <div class="card">
      <h2>Settings</h2>
      <div class="config-panel">
        <div class="config-item">
          <label for="cfg-number-count">Number Count (1–20)</label>
          <input type="number" id="cfg-number-count" value="5" min="1" max="20">
        </div>
        <div class="config-item">
          <label for="cfg-math-digits">Math Digits (1–6)</label>
          <input type="number" id="cfg-math-digits" value="2" min="1" max="6">
        </div>
        <div class="config-item">
          <label for="cfg-math-max">Math Max Value (0 = no limit)</label>
          <input type="number" id="cfg-math-max" value="0" min="0">
        </div>
        <div class="config-item">
          <label for="cfg-timer-min">Timer Minutes (1–60)</label>
          <input type="number" id="cfg-timer-min" value="3" min="1" max="60">
        </div>
      </div>
    </div>

    <!-- Random Numbers -->
    <div class="card">
      <h2>Random Numbers</h2>
      <div id="numbers-display"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-refresh">New Numbers &amp; Problem</button>
      </div>
    </div>

    <!-- Math Challenge -->
    <div class="card">
      <h2>Math Challenge</h2>
      <div id="math-problem"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-new-challenge">New Number</button>
      </div>
    </div>

    <!-- Timer -->
    <div class="card">
      <h2>Countdown Timer</h2>
      <div id="timer-display">03:00</div>
      <div class="btn-row">
        <button class="btn btn-success" id="btn-start">Start</button>
        <button class="btn btn-warning" id="btn-pause">Pause</button>
        <button class="btn btn-danger" id="btn-reset">Reset</button>
      </div>
    </div>
  </div>

  <script src="src/app.js?v=CACHE_BUST"></script>
</body>
</html>
